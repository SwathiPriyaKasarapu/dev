<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Event Registration Form</h2>

    <form id="eventForm">
      
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">
        <div class="error" id="nameError"></div>
      </div>

      <div class="form-group">
        <label for="email">Email ID</label>
        <input type="text" id="email" placeholder="Enter your email">
        <div class="error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="Enter 10-digit phone number">
        <div class="error" id="phoneError"></div>
      </div>

      <div class="form-group">
        <label for="college">College Name</label>
        <input type="text" id="college" placeholder="Enter your college name">
        <div class="error" id="collegeError"></div>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <div class="gender-group">
          <label><input type="radio" name="gender" value="Male"> Male</label>
          <label><input type="radio" name="gender" value="Female"> Female</label>
          <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>
        <div class="error" id="genderError"></div>
      </div>

      <div class="form-group">
        <label for="event">Select Event</label>
        <select id="event">
          <option value="">-- Choose Event --</option>
          <option value="Coding Contest">Coding Contest</option>
          <option value="Hackathon">Hackathon</option>
          <option value="Workshop">Workshop</option>
          <option value="Tech Quiz">Tech Quiz</option>
        </select>
        <div class="error" id="eventError"></div>
      </div>

      <div class="form-group">
        <label for="message">Why do you want to join?</label>
        <textarea id="message" placeholder="Write a short message..."></textarea>
        <div class="error" id="messageError"></div>
      </div>

      <button type="submit" class="btn">Register</button>
      <div class="success" id="successMsg"></div>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
